{% extends 'base.html' %}

{% block title %}Login - WeatherApp{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-200px)]">
    <div class="glass rounded-2xl p-8 w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <i class="fas fa-sign-in-alt text-5xl text-white mb-4"></i>
            <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
            <p class="text-white/70 mt-2">Sign in to access your weather dashboard</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-white/80 text-sm font-medium mb-2">Username</label>
                <input type="text" name="username" class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/30" required autofocus>
            </div>

            <div>
                <label class="block text-white/80 text-sm font-medium mb-2">Password</label>
                <input type="password" name="password" class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/30" required>
            </div>

            {% if form.errors %}
                <div class="bg-red-500/20 border border-red-500/50 text-white p-3 rounded-lg text-sm">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}

            <button type="submit" class="w-full bg-white text-purple-600 py-3 rounded-lg font-semibold hover:bg-white/90 transition shadow-lg">
                Sign In
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-white/70">
                Don't have an account? 
                <a href="{% url 'register' %}" class="text-white font-semibold hover:underline">Sign up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
